syntax = "proto3";
package earthnet.v1;

// EarthNet wire format v0.1 — signed seismic events for earthquake early warning.
// See PROTOCOL-v0.1-DRAFT.md for the normative signing scheme.
// Two messages, two trust levels:
//   Observation    = raw signed pick (low trust; phones need consensus >= N)
//   ConfirmedEvent = post-fusion (high trust; triggers the alarm)

// Privacy level for a signal's location (v0.2). Defined now; wiring it into
// Location is a later slice (adding a field there would touch every existing
// Location construction across the stack). For now privacy is carried per
// modality by the schema registry policy.
enum PrivacyLevel {
  PRIVACY_LEVEL_EXACT     = 0; // as declared (official stations, public)
  PRIVACY_LEVEL_COARSE    = 1; // intentionally coarsened
  PRIVACY_LEVEL_CELL_ONLY = 2; // only the geo-cell is meaningful
  PRIVACY_LEVEL_NONE      = 3; // no usable location
}

// Location with privacy-controlled precision.
// Phones: geohash of ~5 chars (~+-2.4 km). Official stations: exact (public).
message Location {
  string geohash     = 1; // base32 geohash
  uint32 precision_m = 2; // declared precision in meters (consumer hint)
}

enum SourceType {
  SOURCE_TYPE_UNSPECIFIED = 0;
  SOURCE_TYPE_OFFICIAL    = 1; // official station via adapter (high trust, fires alone)
  SOURCE_TYPE_PHONE       = 2; // phone (low trust, needs consensus >= N)
}

// Raw signed pick emitted by a sensor (phone or official station).
message Observation {
  uint32     protocol_version  = 1;  // = 1 in v0.1

  bytes      observation_id    = 2;  // 16 random bytes, for dedup
  bytes      pubkey            = 3;  // Ed25519 pubkey of the emitter (32B) = identity

  SourceType source_type       = 4;
  string     source_id         = 5;  // official station id (e.g. "CSN:GO01"); empty if phone

  // Time: UTC nanoseconds. Clock sync is critical for early warning.
  int64      captured_at_ns    = 6;  // wall-clock UTC ns of the pick
  uint32     clock_uncert_ms   = 7;  // estimated clock uncertainty (NTP/GNSS)

  Location   location          = 8;

  // Pick features. NEVER raw waveform or audio. Derived values only.
  float      sta_lta_ratio     = 9;  // STA/LTA detector ratio
  bool       p_wave_detected   = 10;
  float      estimated_pga     = 11; // estimated PGA (g), optional (0 if N/A)
  float      reported_magnitude = 12; // official EEW sources only; 0 if N/A

  bytes      signature         = 15; // Ed25519 (64B) over signing_payload
}

enum EvidenceKind {
  EVIDENCE_KIND_UNSPECIFIED = 0;
  EVIDENCE_KIND_OFFICIAL    = 1; // triggered by official source
  EVIDENCE_KIND_CONSENSUS   = 2; // triggered by phone consensus
  EVIDENCE_KIND_BOTH        = 3;
}

// Trust tier of a ConfirmedEvent (v0.2). The two planes:
//   PROVISIONAL = a single node's result — warn early, NOT life-safety-certified
//   ALERT       = certified (official-authoritative, or M-of-N node attested)
// A consensus event is emitted PROVISIONAL and later UPGRADED to ALERT by a
// revision (supersedes) once it carries >= M attestations. See
// docs/DESIGN-multi-node-attestation.md ("provisional now, certify in flight").
enum ConfidenceTier {
  CONFIDENCE_TIER_UNSPECIFIED = 0;
  CONFIDENCE_TIER_RESEARCH    = 1; // experimental / research plane
  CONFIDENCE_TIER_PROVISIONAL = 2; // warn early; not yet certified
  CONFIDENCE_TIER_ALERT       = 3; // certified for life-safety
}

// One node's co-signature attesting to a ConfirmedEvent (v0.2). Carrier for the
// future M-of-N threshold; appended AFTER the originator signs, so it is NOT
// covered by the originator's / attestors' signatures (see sign.rs).
message NodeAttestation {
  bytes node_pubkey = 1; // attesting node's Ed25519 pubkey (32B)
  bytes signature   = 2; // Ed25519 (64B) over the event's signing payload
}

// Confirmed event post-fusion. TRIGGERS the alarm on the client.
message ConfirmedEvent {
  uint32   protocol_version = 1;  // = 1 in v0.1

  bytes    event_id         = 2;  // 16B
  bytes    pubkey           = 3;  // pubkey of the confirming node (32B)

  int64    origin_time_ns   = 4;  // estimated earthquake origin time (UTC ns)
  int64    issued_at_ns     = 5;  // when the node issued this event (UTC ns)

  Location epicenter        = 6;
  float    depth_km         = 7;  // optional, 0 if N/A
  float    magnitude        = 8;
  float    magnitude_uncert = 9;

  EvidenceKind evidence     = 10;
  uint32   num_observations = 11; // how many observations fed the fusion
  repeated bytes obs_ids    = 12; // observation_id of the picks used (audit)

  bytes    supersedes       = 13; // previous event_id this revises/replaces; empty if first

  ConfidenceTier tier       = 14; // v0.2; 0 = UNSPECIFIED (v0.1 default)

  bytes    signature        = 15; // Ed25519 (64B) over signing_payload (excludes attestations)

  repeated NodeAttestation attestations = 16; // v0.2; appended after signing, NOT signed by originator
}

// ===========================================================================
// v0.2 — multi-modal Signal envelope (see PROTOCOL-v0.2-DRAFT.md).
// The narrow waist: coarse fabric fields + an opaque, registry-typed payload.
// The v0.1 Observation maps to Signal{MOTION, schema_id=seismic.pick.v1}.
// ===========================================================================

// Coarse, slow-changing class for routing/sharding WITHOUT parsing the payload.
enum ModalityClass {
  MODALITY_CLASS_UNSPECIFIED    = 0;
  MODALITY_CLASS_MOTION         = 1; // accel, gyro, seismometer waveform
  MODALITY_CLASS_FIELD          = 2; // magnetometer, electric field
  MODALITY_CLASS_POSITION       = 3; // GNSS displacement, tilt
  MODALITY_CLASS_ATMOSPHERIC    = 4; // barometer, temperature, humidity, wind
  MODALITY_CLASS_ACOUSTIC       = 5; // microphone FFT, infrasound
  MODALITY_CLASS_IMAGING        = 6; // camera-derived features (never raw)
  MODALITY_CLASS_ENVIRONMENTAL  = 7; // generic IoT / citizen sensors
  MODALITY_CLASS_REMOTE_SENSING = 8; // satellite, weather feeds
  MODALITY_CLASS_DERIVED        = 9; // detector/agent outputs (a pick, an anomaly)
}

// Capability tier of the emitting device.
enum DeviceClass {
  DEVICE_CLASS_UNSPECIFIED = 0;
  DEVICE_CLASS_PHONE       = 1;
  DEVICE_CLASS_STATION     = 2;
  DEVICE_CLASS_IOT         = 3;
  DEVICE_CLASS_SATELLITE   = 4;
  DEVICE_CLASS_DERIVED     = 5;
}

// The multi-modal signal envelope. Stable + universal; modalities evolve in the
// schema registry, not here. Signed exactly like v0.1 (domain || encode w/ empty
// signature); the signature covers the opaque `payload` bytes verbatim.
message Signal {
  uint32        protocol_version = 1;  // = 2

  bytes         observation_id   = 2;  // 16 random bytes (idempotency)
  bytes         pubkey           = 3;  // Ed25519 pubkey (32B) = identity

  ModalityClass modality_class   = 4;  // coarse routing class
  uint64        schema_id        = 5;  // precise {modality, version} -> registry
  SourceType    source_type      = 6;
  DeviceClass   device_class     = 7;

  Location      location         = 8;
  int64         captured_at_ns   = 9;
  uint32        clock_uncert_ms  = 10;

  float         quality          = 11; // 0..1 self-reported SNR (hint, NOT trusted)

  bytes         payload          = 12; // opaque; meaning lives in the schema (schema_id)

  bytes         signature        = 13; // Ed25519 (64B) over signing_payload
}

// Payload schema for schema_id = SCHEMA_SEISMIC_PICK_V1. Carries exactly the
// v0.1 Observation pick semantics, so v0.1 maps in losslessly.
message SeismicPick {
  float sta_lta_ratio      = 1;
  bool  p_wave_detected    = 2;
  float estimated_pga      = 3; // g, 0 if N/A
  float reported_magnitude = 4; // official EEW only; 0 if N/A
}
